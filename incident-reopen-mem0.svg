<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1150 900" width="1150" height="900">
  <style>
    text { font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Courier New', 'Microsoft YaHei', 'SimHei', monospace; fill: #e2e8f0; }
  </style>
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0f1a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <marker id="arrow-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#3b82f6"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#10b981"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#ef4444"/>
    </marker>
    <marker id="arrow-purple" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#a855f7"/>
    </marker>
    <filter id="glow-purple">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-green">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1150" height="900" fill="url(#bg-grad)"/>
  <text x="575" y="50" text-anchor="middle" fill="#e2e8f0" font-size="18" font-weight="700">Incident Flow as Memory Architecture (Mem0 Style)</text>
  <text x="50" y="100" fill="#94a3b8" font-size="14" font-weight="700">SENSORY LAYER</text>
  <text x="500" y="100" fill="#a855f7" font-size="14" font-weight="700">ORCHESTRATION LAYER</text>
  <text x="900" y="100" fill="#10b981" font-size="14" font-weight="700">MEMORY TIER</text>
  <rect x="40.0" y="160.0" width="220" height="80" rx="6" ry="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="150" y="185.0" text-anchor="middle" font-size="14" font-weight="700" fill="#e2e8f0">Helpdesk Interface</text>
  <text x="150" y="205.0" text-anchor="middle" font-size="12" fill="#94a3b8">User input channel</text>
  <rect x="40.0" y="360.0" width="220" height="80" rx="6" ry="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="150" y="385.0" text-anchor="middle" font-size="14" font-weight="700" fill="#e2e8f0">Cron System</text>
  <text x="150" y="405.0" text-anchor="middle" font-size="12" fill="#94a3b8">15 Days Pass Trigger</text>
  <rect x="40.0" y="710.0" width="220" height="80" rx="6" ry="6" fill="#450a0a" stroke="#dc2626" stroke-width="1.5"/>
  <text x="150" y="735.0" text-anchor="middle" font-size="14" font-weight="700" fill="#e2e8f0">Notification Service</text>
  <text x="150" y="755.0" text-anchor="middle" font-size="12" fill="#94a3b8">SMTP Dispatcher</text>
  <rect x="410.0" y="350.0" width="280" height="100" rx="6" ry="6" fill="#1e1b4b" stroke="#7c3aed" stroke-width="1.5" filter="url(#glow-purple)"/>
  <text x="550" y="375.0" text-anchor="middle" font-size="14" font-weight="700" fill="#e2e8f0">Workflow B Engine</text>
  <text x="550" y="395.0" text-anchor="middle" font-size="12" fill="#94a3b8">Batch Auto-Closure</text>
  <text x="550" y="411.0" text-anchor="middle" font-size="12" fill="#94a3b8">Admin Context</text>
  <rect x="410.0" y="530.0" width="280" height="100" rx="6" ry="6" fill="#1e1b4b" stroke="#7c3aed" stroke-width="1.5" filter="url(#glow-purple)"/>
