<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 1020" width="960" height="1020">
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica Neue, 'PingFang SC', 'Microsoft YaHei', 'SimHei', sans-serif; letter-spacing: -0.01em; }
  </style>
  <defs>
    <marker id="arrow-oai" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#71717a"/>
    </marker>
    <marker id="arrow-oai-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#10a37f"/>
    </marker>
    <marker id="arrow-oai-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f97316"/>
    </marker>
  </defs>
  <rect width="960" height="1020" fill="#ffffff"/>
  <text x="480" y="50" text-anchor="middle" fill="#0d0d0d" font-size="20" font-weight="600">Incident Re-opening Flow (OpenAI Style)</text>
  <rect x="440" y="80" width="80" height="30" rx="15" ry="15" fill="#ffffff" stroke="#e5e5e5" stroke-width="1.5"/>
  <text x="480" y="100" text-anchor="middle" fill="#6e6e80" font-size="12" font-weight="600">START</text>
  <rect x="330.0" y="145.0" width="300" height="90" rx="8" ry="8" fill="#ffffff" stroke="#e5e5e5" stroke-width="1.5"/>
  <rect x="330.0" y="145.0" width="4" height="90" rx="2" ry="2" fill="#f97316"/>
  <text x="480" y="170.0" text-anchor="middle" fill="#0d0d0d" font-size="16" font-weight="600">Human Error</text>
  <text x="480" y="192.0" text-anchor="middle" fill="#6e6e80" font-size="13" font-weight="400">Helpdesk Staff makes INC a</text>
  <text x="480" y="210.0" text-anchor="middle" fill="#6e6e80" font-size="13" font-weight="400">CHILD to an unrelated REQ</text>
  <text x="480" y="285" text-anchor="middle" fill="#6e6e80" font-size="12" font-weight="500" font-style="italic">15 Days Pass</text>
  <rect x="330.0" y="340.0" width="300" height="100" rx="8" ry="8" fill="#ffffff" stroke="#e5e5e5" stroke-width="1.5"/>
  <rect x="330.0" y="340.0" width="4" height="100" rx="2" ry="2" fill="#71717a"/>
  <text x="480" y="365.0" text-anchor="middle" fill="#0d0d0d" font-size="16" font-weight="600">Workflow B</text>
  <text x="480" y="387.0" text-anchor="middle" fill="#6e6e80" font-size="13" font-weight="400">Batch Auto-Closure runs</text>
  <text x="480" y="405.0" text-anchor="middle" fill="#6e6e80" font-size="13" font-weight="400">1. Sets Parent REQ to CLOSED</text>
  <text x="480" y="423.0" text-anchor="middle" fill="#6e6e80" font-size="13" font-weight="400">2. Triggers Field Sync</text>
  <rect x="330.0" y="495.0" width="300" height="90" rx="8" ry="8" fill="#ffffff" stroke="#e5e5e5" stroke-width="1.5"/>
  <rect x="330.0" y="495.0" width="4" height="90" rx="2" ry="2" fill="#71717a"/>
  <text x="480" y="520.0" text-anchor="middle" fill="#0d0d0d" font-size="16" font-weight="600">Field Synchronization</text>
  <text x="480" y="542.0" text-anchor="middle" fill="#6e6e80" font-size="13" font-weight="400">Parent's Assignee/Group</text>
  <text x="480" y="560.0" text-anchor="middle" fill="#6e6e80" font-size="13" font-weight="400">are copied to Child INC</text>
  <rect x="330.0" y="640.0" width="300" height="100" rx="8" ry="8" fill="#ffffff" stroke="#e5e5e5" stroke-width="1.5"/>
  <rect x="330.0" y="640.0" width="4" height="100" rx="2" ry="2" fill="#10a37f"/>
  <text x="480" y="665.0" text-anchor="middle" fill="#0d0d0d" font-size="16" font-weight="600">Workflow A</text>
  <text x="480" y="687.0" text-anchor="middle" fill="#6e6e80" font-size="13" font-weight="400">Auto-In Progress runs</text>
  <text x="480" y="705.0" text-anchor="middle" fill="#6e6e80" font-size="13" font-weight="400">Detects Assignee change</text>
  <text x="480" y="723.0" text-anchor="middle" fill="#6e6e80" font-size="13" font-weight="400">Changes INC to IN PROGRESS</text>
  <rect x="330.0" y="795.0" width="300" height="90" rx="8" ry="8" fill="#ffffff" stroke="#e5e5e5" stroke-width="1.5"/>
  <rect x="330.0" y="795.0" width="4" height="90" rx="2" ry="2" fill="#f97316"/>
  <text x="480" y="820.0" text-anchor="middle" fill="#0d0d0d" font-size="16" font-weight="600">Incident Re-opened</text>
  <text x="480" y="842.0" text-anchor="middle" fill="#6e6e80" font-size="13" font-weight="400">Resolved Ticket now In Progress</text>
  <text x="480" y="860.0" text-anchor="middle" fill="#6e6e80" font-size="13" font-weight="400">Notification Email Sent</text>
  <rect x="440" y="940" width="80" height="30" rx="15" ry="15" fill="#ffffff" stroke="#e5e5e5" stroke-width="1.5"/>
  <text x="480" y="960" text-anchor="middle" fill="#6e6e80" font-size="12" font-weight="600">END</text>
  <line x1="480" y1="110" x2="480" y2="145" stroke="#71717a" stroke-width="1.5" marker-end="url(#arrow-oai)"/>
  <line x1="480" y1="235" x2="480" y2="340" stroke="#f97316" stroke-width="1.5" marker-end="url(#arrow-oai-orange)"/>
  <line x1="480" y1="440" x2="480" y2="495" stroke="#71717a" stroke-width="1.5" marker-end="url(#arrow-oai)"/>
  <rect x="400" y="455.5" width="160" height="24" fill="#ffffff" opacity="0.9"/>
  <text x="480" y="471.5" text-anchor="middle" fill="#6e6e80" font-size="12" font-weight="500">Trigger Sync</text>
  <line x1="480" y1="585" x2="480" y2="640" stroke="#71717a" stroke-width="1.5" marker-end="url(#arrow-oai)"/>
  <rect x="400" y="600.5" width="160" height="24" fill="#ffffff" opacity="0.9"/>
  <text x="480" y="616.5" text-anchor="middle" fill="#6e6e80" font-size="12" font-weight="500">New Assignee</text>
  <line x1="480" y1="740" x2="480" y2="795" stroke="#10a37f" stroke-width="1.5" marker-end="url(#arrow-oai-green)"/>
  <rect x="400" y="755.5" width="160" height="24" fill="#ffffff" opacity="0.9"/>
  <text x="480" y="771.5" text-anchor="middle" fill="#6e6e80" font-size="12" font-weight="500">Status Update</text>
  <line x1="480" y1="885" x2="480" y2="940" stroke="#f97316" stroke-width="1.5" marker-end="url(#arrow-oai-orange)"/>
</svg>