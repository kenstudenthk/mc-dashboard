<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 1000" width="960" height="1000">
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, 'PingFang SC', 'Microsoft YaHei', 'SimHei', sans-serif; }
  </style>
  <defs>
    <marker id="arrow-claude" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <polygon points="0 0, 8 4, 0 8" fill="#5a5a5a"/>
    </marker>
    <filter id="shadow-soft">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#000000" flood-opacity="0.08"/>
    </filter>
  </defs>
  <rect width="960" height="1000" fill="#f8f6f3"/>
  <text x="480" y="50" text-anchor="middle" fill="#1a1a1a" font-size="22" font-weight="700">Incident Re-opening Flow (Claude Style)</text>
  <rect x="440" y="80" width="80" height="30" rx="15" ry="15" fill="#e8e6e3" stroke="#4a4a4a" stroke-width="2"/>
  <text x="480" y="100" text-anchor="middle" fill="#1a1a1a" font-size="14" font-weight="600">START</text>
  <rect x="330.0" y="145.0" width="300" height="90" rx="12" ry="12" fill="#a8c5e6" stroke="#4a4a4a" stroke-width="2.5" filter="url(#shadow-soft)"/>
  <text x="480" y="170.0" text-anchor="middle" fill="#1a1a1a" font-size="16" font-weight="600">Human Error</text>
  <text x="480" y="192.0" text-anchor="middle" fill="#1a1a1a" font-size="14" font-weight="400">Helpdesk Staff makes INC a</text>
  <text x="480" y="210.0" text-anchor="middle" fill="#1a1a1a" font-size="14" font-weight="400">CHILD to an unrelated REQ</text>
  <text x="480" y="285" text-anchor="middle" fill="#6a6a6a" font-size="14" font-weight="600" font-style="italic">(15 Days Pass)</text>
  <rect x="330.0" y="340.0" width="300" height="100" rx="12" ry="12" fill="#9dd4c7" stroke="#4a4a4a" stroke-width="2.5" filter="url(#shadow-soft)"/>
  <text x="480" y="365.0" text-anchor="middle" fill="#1a1a1a" font-size="16" font-weight="600">WORKFLOW B</text>
  <text x="480" y="387.0" text-anchor="middle" fill="#1a1a1a" font-size="14" font-weight="400">Batch Auto-Closure runs</text>
  <text x="480" y="405.0" text-anchor="middle" fill="#1a1a1a" font-size="14" font-weight="400">1. Sets Parent REQ to CLOSED</text>
  <text x="480" y="423.0" text-anchor="middle" fill="#1a1a1a" font-size="14" font-weight="400">2. Triggers Field Sync</text>
  <rect x="330.0" y="495.0" width="300" height="90" rx="12" ry="12" fill="#e8e6e3" stroke="#4a4a4a" stroke-width="2.5" filter="url(#shadow-soft)"/>
  <text x="480" y="520.0" text-anchor="middle" fill="#1a1a1a" font-size="16" font-weight="600">Field Synchronization</text>
  <text x="480" y="542.0" text-anchor="middle" fill="#1a1a1a" font-size="14" font-weight="400">Parent's Assignee/Group</text>
  <text x="480" y="560.0" text-anchor="middle" fill="#1a1a1a" font-size="14" font-weight="400">are copied to Child INC</text>
  <rect x="330.0" y="640.0" width="300" height="100" rx="12" ry="12" fill="#9dd4c7" stroke="#4a4a4a" stroke-width="2.5" filter="url(#shadow-soft)"/>
  <text x="480" y="665.0" text-anchor="middle" fill="#1a1a1a" font-size="16" font-weight="600">WORKFLOW A</text>
  <text x="480" y="687.0" text-anchor="middle" fill="#1a1a1a" font-size="14" font-weight="400">Auto-In Progress runs</text>
  <text x="480" y="705.0" text-anchor="middle" fill="#1a1a1a" font-size="14" font-weight="400">Detects Assignee change</text>
  <text x="480" y="723.0" text-anchor="middle" fill="#1a1a1a" font-size="14" font-weight="400">Changes INC to IN PROGRESS</text>
  <rect x="330.0" y="795.0" width="300" height="90" rx="12" ry="12" fill="#f4e4c1" stroke="#4a4a4a" stroke-width="2.5" filter="url(#shadow-soft)"/>
  <text x="480" y="820.0" text-anchor="middle" fill="#1a1a1a" font-size="16" font-weight="600">INCIDENT RE-OPENED</text>
  <text x="480" y="842.0" text-anchor="middle" fill="#1a1a1a" font-size="14" font-weight="400">Resolved Ticket now In Progress</text>
  <text x="480" y="860.0" text-anchor="middle" fill="#1a1a1a" font-size="14" font-weight="400">Notification Email Sent</text>
  <rect x="440" y="920" width="80" height="30" rx="15" ry="15" fill="#e8e6e3" stroke="#4a4a4a" stroke-width="2"/>
  <text x="480" y="940" text-anchor="middle" fill="#1a1a1a" font-size="14" font-weight="600">END</text>
  <line x1="480" y1="110" x2="480" y2="145" stroke="#5a5a5a" stroke-width="2" marker-end="url(#arrow-claude)"/>
  <line x1="480" y1="235" x2="480" y2="340" stroke="#5a5a5a" stroke-width="2" marker-end="url(#arrow-claude)"/>
  <line x1="480" y1="440" x2="480" y2="495" stroke="#5a5a5a" stroke-width="2" marker-end="url(#arrow-claude)"/>
  <rect x="400" y="455.5" width="160" height="24" fill="#f8f6f3" opacity="0.95"/>
  <text x="480" y="471.5" text-anchor="middle" fill="#5a5a5a" font-size="13" font-weight="600">Trigger Sync</text>
  <line x1="480" y1="585" x2="480" y2="640" stroke="#5a5a5a" stroke-width="2" marker-end="url(#arrow-claude)"/>
  <rect x="400" y="600.5" width="160" height="24" fill="#f8f6f3" opacity="0.95"/>
  <text x="480" y="616.5" text-anchor="middle" fill="#5a5a5a" font-size="13" font-weight="600">New Assignee</text>
  <line x1="480" y1="740" x2="480" y2="795" stroke="#5a5a5a" stroke-width="2" marker-end="url(#arrow-claude)"/>
  <rect x="400" y="755.5" width="160" height="24" fill="#f8f6f3" opacity="0.95"/>
  <text x="480" y="771.5" text-anchor="middle" fill="#5a5a5a" font-size="13" font-weight="600">Status Update</text>
</svg>