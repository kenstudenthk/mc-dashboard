name: Build & Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # IMPORTANT: When adding a new VITE_* secret to GitHub repo settings,
      # you MUST also add it here in BOTH the `run:` echo lines AND the `env:` map.
      # Setting the secret in GitHub alone is not enough — this workflow builds the
      # app in GitHub Actions (not Cloudflare Pages), so only secrets listed below
      # get written to .env and bundled by Vite.
      - name: Write env vars
        run: |
          echo "VITE_API_ORDERS_URL=$VITE_API_ORDERS_URL" >> .env
          echo "VITE_API_CUSTOMERS_URL=$VITE_API_CUSTOMERS_URL" >> .env
          echo "VITE_API_PERMISSIONS_URL=$VITE_API_PERMISSIONS_URL" >> .env
          echo "VITE_API_ORDER_TIMELINE_URL=$VITE_API_ORDER_TIMELINE_URL" >> .env
          echo "VITE_API_AUDIT_LOGS_URL=$VITE_API_AUDIT_LOGS_URL" >> .env
          echo "VITE_API_QUICK_LINKS_URL=$VITE_API_QUICK_LINKS_URL" >> .env
          echo "VITE_API_SERVICE_ACCOUNTS_URL=$VITE_API_SERVICE_ACCOUNTS_URL" >> .env
          echo "VITE_API_ORDER_STEPS_URL=$VITE_API_ORDER_STEPS_URL" >> .env
          echo "VITE_API_GET_PAGE_URL=$VITE_API_GET_PAGE_URL" >> .env
          echo "VITE_API_EMAIL_TEMPLATES_URL=$VITE_API_EMAIL_TEMPLATES_URL" >> .env
          echo "VITE_API_EMAIL_URL=$VITE_API_EMAIL_URL" >> .env
          echo "VITE_SUPABASE_URL=$VITE_SUPABASE_URL" >> .env
          echo "VITE_SUPABASE_ANON_KEY=$VITE_SUPABASE_ANON_KEY" >> .env
          echo "VITE_API_PINNED_ORDER_URL=$VITE_API_PINNED_ORDER_URL" >> .env
        env:
          VITE_API_ORDERS_URL: ${{ secrets.VITE_API_ORDERS_URL }}
          VITE_API_CUSTOMERS_URL: ${{ secrets.VITE_API_CUSTOMERS_URL }}
          VITE_API_PERMISSIONS_URL: ${{ secrets.VITE_API_PERMISSIONS_URL }}
          VITE_API_ORDER_TIMELINE_URL: ${{ secrets.VITE_API_ORDER_TIMELINE_URL }}
          VITE_API_AUDIT_LOGS_URL: ${{ secrets.VITE_API_AUDIT_LOGS_URL }}
          VITE_API_QUICK_LINKS_URL: ${{ secrets.VITE_API_QUICK_LINKS_URL }}
          VITE_API_SERVICE_ACCOUNTS_URL: ${{ secrets.VITE_API_SERVICE_ACCOUNTS_URL }}
          VITE_API_ORDER_STEPS_URL: ${{ secrets.VITE_API_ORDER_STEPS_URL }}
          VITE_API_GET_PAGE_URL: ${{ secrets.VITE_API_GET_PAGE_URL }}
          VITE_API_EMAIL_TEMPLATES_URL: ${{ secrets.VITE_API_EMAIL_TEMPLATES_URL }}
          VITE_API_EMAIL_URL: ${{ secrets.VITE_API_EMAIL_URL }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_API_PINNED_ORDER_URL: ${{ secrets.VITE_API_PINNED_ORDER_URL }}

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy dist --project-name=mc-dashboard-git --branch=main --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
