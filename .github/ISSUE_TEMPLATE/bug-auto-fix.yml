name: Bug (Auto-Fix)
description: Report a bug to be automatically fixed by the auto-fix workflow
labels: ["bug", "auto-fix"]
body:
  - type: input
    id: component
    attributes:
      label: Component or File
      description: Which component or file is affected?
      placeholder: "e.g. src/components/OrderDetails.tsx"
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      placeholder: "1. Go to...\n2. Click...\n3. See error"
    validations:
      required: true
  - type: textarea
    id: error
    attributes:
      label: Error Message or Stack Trace
      render: shell
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true
